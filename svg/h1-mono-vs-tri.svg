<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-labelledby="t-h1b">
<!-- Verificatie: headroom-uitleg Rob van der Meulen (nederlanders.fr 11-11-2021, oogst-item 7); kVA/A-verhouding beschrijvend. 04-07-2026.
     Bijschrift: Naar de forumuitleg van Rob van der Meulen (2021), geactualiseerd naar NF C 15-100 (2024). -->
<title id="t-h1b">Dezelfde 9 kVA: één emmer van 45 A (mono) of drie emmertjes van 15 A (tri)</title>
<style>
  text{font-family:Poppins,sans-serif;fill:#333333;font-size:15px}
  .kop{fill:#800000;font-size:18px;font-weight:600}
  .sub{font-size:13px;fill:#666666}
  .balk{fill:rgba(128,0,0,0.12);stroke:#800000;stroke-width:2}
  .vul{fill:rgba(128,0,0,0.45)}
  .lijn{stroke:#800000;stroke-width:2}
</style>
<text x="20" y="34" class="kop">Monophasé 9 kVA</text>
<rect x="40" y="60" width="120" height="300" class="balk"/>
<rect x="40" y="210" width="120" height="150" class="vul"/>
<text x="46" y="385" class="sub">wasmachine + droger</text>
<text x="180" y="72">45 A totaal beschikbaar</text>
<text x="180" y="96" class="sub">alles mag in één "emmer";</text>
<text x="180" y="116" class="sub">pas boven 45 A schakelt Linky af</text>

<text x="480" y="34" class="kop">Triphasé 9 kVA</text>
<rect x="500" y="60" width="80" height="300" class="balk"/>
<rect x="500" y="90" width="80" height="270" class="vul"/>
<text x="505" y="385" class="sub">fase 1: was + droger ⚡</text>
<rect x="610" y="60" width="80" height="300" class="balk"/>
<rect x="610" y="330" width="80" height="30" class="vul"/>
<text x="622" y="385" class="sub">fase 2</text>
<rect x="720" y="60" width="80" height="300" class="balk"/>
<rect x="720" y="345" width="80" height="15" class="vul"/>
<text x="732" y="385" class="sub">fase 3</text>
<text x="500" y="425" class="sub">3 × 15 A: overschrijdt één fase de 15 A, dan zit het héle huis zonder stroom.</text>
<text x="20" y="425" class="sub">"Meer headroom, meer speelruimte."</text>
<text x="20" y="445" class="sub">— Rob van der Meulen, 2021</text>
</svg>
