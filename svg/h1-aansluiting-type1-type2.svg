<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="t-h1a">
<!-- Verificatie: V1/deel 10-continuïteit + Robs artikel elektriciteitsaanvoer (30 m-regel type 1/2), 04-07-2026.
     Bijschrift: Naar het oorspronkelijke schema van Rob van der Meulen (2008–2017), geactualiseerd naar NF C 15-100 (2024). -->
<title id="t-h1a">Aansluiting type 1 en type 2: waar staan meter en hoofdschakelaar</title>
<style>
  text{font-family:Poppins,sans-serif;fill:#333333;font-size:15px}
  .kop{fill:#800000;font-size:18px;font-weight:600}
  .sub{font-size:13px;fill:#666666}
  .doos{fill:rgba(128,0,0,0.05);stroke:#800000;stroke-width:2}
  .lijn{stroke:#800000;stroke-width:2.5;fill:none}
  .stippel{stroke:#800000;stroke-width:1.5;stroke-dasharray:6 5;fill:none}
  .label{font-size:14px}
</style>
<text x="20" y="32" class="kop">Type 1 — huis &lt; 30 m van de erfgrens</text>
<line x1="20" y1="70" x2="20" y2="200" class="stippel"/>
<text x="8" y="220" class="sub">erfgrens</text>
<line x1="0" y1="130" x2="150" y2="130" class="lijn"/>
<text x="30" y="120" class="sub">net (Enedis)</text>
<rect x="150" y="100" width="120" height="60" class="doos"/>
<text x="162" y="126" class="label">coffret</text>
<text x="162" y="146" class="label">coupe-circuit</text>
<line x1="270" y1="130" x2="420" y2="130" class="lijn"/>
<rect x="420" y="70" width="240" height="120" class="doos"/>
<text x="435" y="95" class="label" style="fill:#800000;font-weight:600">binnenshuis (panneau/GTL)</text>
<text x="435" y="120" class="label">meter (Linky)</text>
<text x="435" y="143" class="label">disjoncteur de branchement</text>
<text x="435" y="166" class="label">= grens Enedis / eigenaar</text>
<line x1="660" y1="130" x2="760" y2="130" class="lijn"/>
<rect x="760" y="100" width="120" height="60" class="doos"/>
<text x="775" y="126" class="label">tableau</text>
<text x="775" y="146" class="label">électrique</text>

<text x="20" y="292" class="kop">Type 2 — huis &gt; 30 m van de erfgrens</text>
<line x1="20" y1="330" x2="20" y2="460" class="stippel"/>
<text x="8" y="480" class="sub">erfgrens</text>
<line x1="0" y1="390" x2="120" y2="390" class="lijn"/>
<text x="26" y="380" class="sub">net (Enedis)</text>
<rect x="120" y="335" width="230" height="110" class="doos"/>
<text x="135" y="360" class="label" style="fill:#800000;font-weight:600">buiten aan de weg</text>
<text x="135" y="385" class="label">coffret + meter (Linky)</text>
<text x="135" y="408" class="label">+ disjoncteur de branchement</text>
<line x1="350" y1="390" x2="620" y2="390" class="lijn" stroke-dasharray="2 6"/>
<text x="400" y="378" class="sub">ondergronds, &gt; 30 m — spanningsval telt mee (H5)</text>
<rect x="620" y="360" width="120" height="60" class="doos"/>
<text x="635" y="386" class="label">tableau</text>
<text x="635" y="406" class="label">électrique</text>
<text x="20" y="505" class="sub">Tussenvorm (tot ±1989): zekeringen + meter bij het hek, DB binnen bij de groepenkast.</text>
</svg>
