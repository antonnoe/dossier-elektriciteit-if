<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="t-h3a">
<!-- Verificatie: V2 (alle circuits ≤30 mA; min. 2 ID's; max. 8 circuits/ID; licht en prises gescheiden en verdeeld; 20% reserve), 04-07-2026.
     Bijschrift: Naar het oorspronkelijke schema van Rob van der Meulen (2008–2017), geactualiseerd naar NF C 15-100 (2024). -->
<title id="t-h3a">Opbouw van de Franse groepenkast volgens de 2024-normserie</title>
<style>
  text{font-family:Poppins,sans-serif;fill:#333333;font-size:15px}
  .kop{fill:#800000;font-size:18px;font-weight:600}
  .sub{font-size:13px;fill:#666666}
  .doos{fill:rgba(128,0,0,0.05);stroke:#800000;stroke-width:2}
  .id{fill:rgba(128,0,0,0.14);stroke:#800000;stroke-width:2}
  .lijn{stroke:#800000;stroke-width:2;fill:none}
</style>
<text x="20" y="34" class="kop">Van DB naar circuits</text>
<rect x="20" y="60" width="200" height="54" class="doos"/>
<text x="34" y="83">disjoncteur de</text>
<text x="34" y="103">branchement (H2)</text>
<line x1="220" y1="87" x2="300" y2="87" class="lijn"/>
<rect x="300" y="60" width="250" height="54" class="doos"/>
<text x="314" y="83">borniers: fase (rood)</text>
<text x="314" y="103">en nul (blauw)</text>
<line x1="425" y1="114" x2="425" y2="160" class="lijn"/>
<line x1="180" y1="160" x2="700" y2="160" class="lijn"/>
<line x1="180" y1="160" x2="180" y2="190" class="lijn"/>
<line x1="700" y1="160" x2="700" y2="190" class="lijn"/>
<rect x="60" y="190" width="240" height="60" class="id"/>
<text x="76" y="215">ID 1 · 30 mA · type A</text>
<text x="76" y="236" class="sub">min. 2 ID's per woning</text>
<rect x="580" y="190" width="240" height="60" class="id"/>
<text x="596" y="215">ID 2 · 30 mA · type AC/A</text>
<text x="596" y="236" class="sub">(+ type F bij warmtepomp/airco)</text>
<line x1="180" y1="250" x2="180" y2="290" class="lijn"/>
<line x1="700" y1="250" x2="700" y2="290" class="lijn"/>
<line x1="80" y1="290" x2="280" y2="290" class="lijn"/>
<line x1="600" y1="290" x2="800" y2="290" class="lijn"/>
<g>
<line x1="80" y1="290" x2="80" y2="310" class="lijn"/>
<line x1="180" y1="290" x2="180" y2="310" class="lijn"/>
<line x1="280" y1="290" x2="280" y2="310" class="lijn"/>
<rect x="45" y="310" width="70" height="44" class="doos"/><text x="55" y="337" class="sub">licht 1</text>
<rect x="145" y="310" width="70" height="44" class="doos"/><text x="152" y="337" class="sub">prises 1</text>
<rect x="245" y="310" width="70" height="44" class="doos"/><text x="250" y="337" class="sub">kookplaat</text>
</g>
<g>
<line x1="600" y1="290" x2="600" y2="310" class="lijn"/>
<line x1="700" y1="290" x2="700" y2="310" class="lijn"/>
<line x1="800" y1="290" x2="800" y2="310" class="lijn"/>
<rect x="565" y="310" width="70" height="44" class="doos"/><text x="575" y="337" class="sub">licht 2</text>
<rect x="665" y="310" width="70" height="44" class="doos"/><text x="672" y="337" class="sub">prises 2</text>
<rect x="765" y="310" width="70" height="44" class="doos"/><text x="775" y="337" class="sub">boiler</text>
</g>
<text x="330" y="330" class="sub">max. 8 circuits per ID —</text>
<text x="330" y="350" class="sub">ongeacht kaliber (40/63 A)</text>
<text x="20" y="410" style="fill:#800000;font-weight:600">De vier vaste regels</text>
<text x="20" y="438">• Alle circuits achter ≤ 30 mA  • Licht en stopcontacten: gescheiden circuits, verdeeld over ≥ 2 ID's</text>
<text x="20" y="464">• Max. 8 circuits per ID  • 20% reserveruimte, minimaal 6 vrije modules</text>
<text x="20" y="500" class="sub">Fase rechts, nul links op de Franse automaat — precies andersom dan in Nederland.</text>
<text x="20" y="524" class="sub">Zekeringen zijn in nieuwbouw/renovatie niet meer toegestaan: alleen dubbelpolige disjoncteurs.</text>
</svg>
