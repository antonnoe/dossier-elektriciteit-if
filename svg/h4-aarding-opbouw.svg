<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-labelledby="t-h4a">
<!-- Verificatie: V3 (elektrodekeuze, 100/50/10 Ω-band, barrette, secties, LEP 6 mm²), 04-07-2026.
     Bijschrift: Naar het oorspronkelijke schema van Rob van der Meulen (2008–2017), geactualiseerd naar NF C 15-100 (2024). -->
<title id="t-h4a">De aardingsketen: van elektrode tot groepenkast</title>
<style>
  text{font-family:Poppins,sans-serif;fill:#333333;font-size:15px}
  .kop{fill:#800000;font-size:18px;font-weight:600}
  .sub{font-size:13px;fill:#666666}
  .doos{fill:rgba(128,0,0,0.05);stroke:#800000;stroke-width:2}
  .lijn{stroke:#800000;stroke-width:2.5;fill:none}
  .grond{stroke:#800000;stroke-width:1.5;stroke-dasharray:4 4}
</style>
<text x="20" y="34" class="kop">De keten (altijd dezelfde)</text>
<line x1="20" y1="440" x2="880" y2="440" class="grond"/>
<text x="800" y="462" class="sub">maaiveld</text>
<rect x="30" y="460" width="250" height="60" class="doos"/>
<text x="44" y="486">1 · aardelektrode</text>
<text x="44" y="506" class="sub">boucle &gt; geul &gt; piquet(s)</text>
<line x1="155" y1="460" x2="155" y2="330" class="lijn"/>
<text x="165" y="400" class="sub">25 mm² blank /</text>
<text x="165" y="418" class="sub">16 mm² geïsoleerd</text>
<rect x="60" y="270" width="200" height="60" class="doos"/>
<text x="74" y="296">2 · barrette de mesure</text>
<text x="74" y="316" class="sub">losneembaar meetpunt</text>
<line x1="260" y1="300" x2="380" y2="300" class="lijn"/>
<rect x="380" y="270" width="230" height="60" class="doos"/>
<text x="394" y="296">3 · répartiteur de terre</text>
<text x="394" y="316" class="sub">in de groepenkast</text>
<line x1="610" y1="300" x2="700" y2="300" class="lijn"/>
<rect x="700" y="240" width="180" height="120" class="doos"/>
<text x="714" y="268">4 · groen-gele</text>
<text x="714" y="290">aders naar álle</text>
<text x="714" y="312">circuits en</text>
<text x="714" y="334">lichtpunten</text>
<line x1="160" y1="270" x2="160" y2="160" class="lijn"/>
<rect x="60" y="100" width="300" height="60" class="doos"/>
<text x="74" y="126">LEP — hoofdvereffening (≥ 6 mm²)</text>
<text x="74" y="146" class="sub">waterleiding · cv · metalen structuren</text>
<rect x="470" y="60" width="410" height="130" class="doos"/>
<text x="486" y="90" style="fill:#800000;font-weight:600">De weerstandsband (V3)</text>
<text x="486" y="118">&lt; 100 Ω — wettelijk maximum</text>
<text x="486" y="142">&lt; 50 Ω — advies (seizoensmarge!)</text>
<text x="486" y="166">&lt; 10 Ω — streefwaarde bij parafoudre</text>
<text x="20" y="60" class="sub">Verboden als elektrode: waterleiding of put (wel aan de vereffening koppelen).</text>
</svg>
